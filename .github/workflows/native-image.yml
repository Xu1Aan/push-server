name: native-image

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux-amd64
            arch: amd64
            ext: ""
          - os: ubuntu-24.04-arm
            artifact: linux-arm64
            arch: arm64
            ext: ""
          - os: macos-latest
            artifact: macos
            arch: macos
            ext: ""
          - os: windows-latest
            artifact: windows
            arch: windows
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Liberica NIK
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'liberica'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: 'maven'

      - name: Select Maven command
        shell: bash
        run: |
          if [ -f ./mvnw ]; then
            chmod +x ./mvnw
            echo "MVN_CMD=./mvnw" >> "$GITHUB_ENV"
          else
            echo "MVN_CMD=mvn" >> "$GITHUB_ENV"
          fi

      - name: Checkout Frontend
        uses: actions/checkout@v4
        with:
          repository: qingzhou-dev/push-server-web
          path: push-server-web

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend
        shell: bash
        run: |
          cd push-server-web
          npm install
          npm run build
          cd ..
          mkdir -p push-server-core/src/main/resources/static
          cp -r push-server-web/dist/* push-server-core/src/main/resources/static/

      - name: Build native image
        shell: bash
        run: ${{ env.MVN_CMD }} -B -pl push-server-core -am -Pnative -DskipTests native:compile

      - name: Rename binary
        shell: bash
        run: |
          mkdir -p target-bin
          src="push-server-core/target/push-server-core${{ matrix.ext }}"
          dest="target-bin/push-server-${{ matrix.artifact }}${{ matrix.ext }}"
          if [ -f "$src" ]; then
            mv "$src" "$dest"
          else
            echo "Error: Binary not found at $src"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: push-server-${{ matrix.artifact }}
          path: target-bin/push-server-${{ matrix.artifact }}${{ matrix.ext }}
          if-no-files-found: error

      - name: Upload release asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: target-bin/push-server-${{ matrix.artifact }}${{ matrix.ext }}

  docker-push:
    name: docker push
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: push-server-linux-amd64
          path: bin-amd64

      - name: Download arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: push-server-linux-arm64
          path: bin-arm64

      - name: Prepare binaries
        run: |
          mkdir -p target
          cp bin-amd64/push-server-linux-amd64 target/push-server-amd64
          cp bin-arm64/push-server-linux-arm64 target/push-server-arm64
          ls -R target

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            qingzhoudev/push-server
            ghcr.io/qingzhou-dev/push-server
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
